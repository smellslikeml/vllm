name: Outrider

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Which model provider to route Claude Code at.'
        type: choice
        required: false
        default: 'anthropic'
        options:
          - anthropic
          - zai
      model:
        description: 'Specific model name (empty = provider default).'
        required: false
        default: ''
      search-method:
        description: 'Optional method query — top hit of an engine search overrides the ranker pool.'
        required: false
        default: ''
      pin-arxiv:
        description: 'Optional arxiv_id to implement directly (bypasses selection).'
        required: false
        default: ''
      claude-timeout:
        description: 'Wall-clock seconds for the Claude Code agent calls.'
        required: false
        default: '900'
      lead-content:
        description: 'Optional hand-crafted implementation spec (landing-zone-to-PR mode). Overrides suggested_experiment.'
        required: false
        default: ''

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
    steps:
      - name: Configure provider auth
        shell: bash
        env:
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY_SECRET: ${{ secrets.ZAI_API_KEY }}
          MODEL_INPUT: ${{ inputs.model }}
        run: |
          if [ "${{ inputs.provider }}" = "zai" ]; then
            echo "ANTHROPIC_AUTH_TOKEN=$ZAI_API_KEY_SECRET" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$MODEL_INPUT" ]; then
            echo "ANTHROPIC_MODEL=$MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - uses: remyxai/outrider@feat/lead-implementation-spec
        with:
          interest-id: d53f77f5-f1c8-4816-89e9-51fef2f78bb5
          rate-limit-days: '0'
          search-method: ${{ inputs.search-method }}
          pin-arxiv: ${{ inputs.pin-arxiv }}
          claude-timeout: ${{ inputs.claude-timeout }}
          lead-content: ${{ inputs.lead-content }}
          model-base-url: ${{ inputs.provider == 'zai' && 'https://api.z.ai/api/anthropic' || '' }}
